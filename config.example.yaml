# 市场数据采集配置 — 模板文件
# 复制为 config.yaml 并填入真实 token，或通过环境变量 TUSHARE_TOKEN 设置
tushare:
  token: ""

database:
  path: "data/market.duckdb"

data:
  start_date: "2015-01-01"
  markets:
    - A      # A股
    - ETF    # ETF
    - HK     # 港股
    - US     # 美股

# Tushare 接口级限速（不同接口有不同频率限制）
# 注：stock_basic 限制 1次/小时，daily/daily_basic/adj_factor 限制 50次/分钟
rate_limit:
  tushare:
    max_calls: 45         # 默认限速（向后兼容）
    period: 60
    # 接口级限速（可选，覆盖默认值）
    stock_basic:
      max_calls: 1
      period: 3600
    daily:
      max_calls: 45
      period: 60
    daily_basic:
      max_calls: 45
      period: 60
    adj_factor:
      max_calls: 45
      period: 60
  akshare:
    max_calls: 48
    period: 60
  yfinance:
    max_calls: 200
    period: 3600

retry:
  max_attempts: 3
  backoff_base: 5

logging:
  level: "INFO"
  file: "data/pipeline.log"

# LLM 配置（Phase 3: AI Chat）
# 支持: deepseek / glm / openai / lmstudio
llm:
  provider: "deepseek"              # deepseek | glm | openai | lmstudio
  api_key: ""                        # 填入你的 API Key
  model: "deepseek-chat"            # 或 glm-4-flash / gpt-4o-mini
  base_url: ""                      # 留空自动使用 provider 默认 URL

