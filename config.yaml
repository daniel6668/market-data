# 市场数据采集配置
# 在下方填入 Tushare token 即可（config.yaml 已被 .gitignore 排除，不会进入版本控制）
tushare:
  token: "d98706c9f69f0ec43109956d7213b0afb8fbd1facd5bef341da274f2"

database:
  path: "data/market.duckdb"

data:
  start_date: "2015-01-01"
  markets:
    - A      # A股
    - ETF    # ETF
    - HK     # 港股
    - US     # 美股

# Tushare 接口级限速（不同接口有不同频率限制）
# 注：stock_basic 限制 1次/小时，daily/daily_basic/adj_factor 限制 50次/分钟
rate_limit:
  tushare:
    max_calls: 45         # 默认限速（向后兼容）
    period: 60
    # 接口级限速（可选，覆盖默认值）
    stock_basic:
      max_calls: 1
      period: 3600
    daily:
      max_calls: 45
      period: 60
    daily_basic:
      max_calls: 45
      period: 60
    adj_factor:
      max_calls: 45
      period: 60
  akshare:
    max_calls: 48
    period: 60
  yfinance:
    max_calls: 200
    period: 3600

retry:
  max_attempts: 3
  backoff_base: 5

logging:
  level: "INFO"
  file: "data/pipeline.log"

# LLM 配置（Phase 3: AI Chat）
llm:
  provider: deepseek
  api_key: sk-c3d8f975b5f34382bea879e6f5ab96f8
  model: deepseek-v4-flash

# 策略规则配置（Phase 2: 策略研究-监控系统）
strategies:
  A:
    label: "A股"
    sell_rules:
      stop_loss: -8
      stop_profit: 30
      ma_break: [ma20, ma60]
      pattern: [macd_dead_cross]
    remove_conditions:
      - type: price_below_ma
        ma: ma60
        consecutive_days: 5
      - type: macd_dead_cross
        consecutive_days: 3
  ETF:
    label: "ETF基金"
    sell_rules:
      stop_loss: -5
      stop_profit: 15
      ma_break: [ma20]
      pattern: [macd_dead_cross]
    remove_conditions:
      - type: price_below_ma
        ma: ma20
        consecutive_days: 3
  HK:
    label: "港股"
    sell_rules:
      stop_loss: -10
      stop_profit: 20
      ma_break: [ma60]
      pattern: [macd_dead_cross]
    remove_conditions:
      - type: price_below_ma
        ma: ma60
        consecutive_days: 5
  US:
    label: "美股"
    sell_rules:
      stop_loss: -10
      stop_profit: 25
      ma_break: [ma20, ma60]
      pattern: [macd_dead_cross]
    remove_conditions:
      - type: price_below_ma
        ma: ma60
        consecutive_days: 5
